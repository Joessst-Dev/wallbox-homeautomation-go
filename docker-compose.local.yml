# Local development override: build the wha image from source instead of pulling
# the published GHCR image. Layer it on top of the base compose file:
#
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Deliberately NOT named docker-compose.override.yml, so it does NOT auto-apply
# on the Pi (which uses the published image via `docker compose up` alone).
services:
  wha:
    build: .
    # Tag the local build distinctly so it never clobbers the pulled :edge image.
    image: ghcr.io/joessst-dev/wha:local
    # The in-UI updater pulls published semver images; that makes no sense for a
    # from-source build, so turn it off for local dev (the "Software" card then
    # shows the manual-update note instead).
    environment:
      - WHA_UPDATE_ENABLED=false
    # Pass --build (the documented command + `make compose-local` both do) to pick
    # up source changes. We intentionally avoid `pull_policy: build` here: it needs
    # Docker Compose >= 2.17 and is silently ignored on older Pi OS toolchains,
    # where it would try to pull the nonexistent :local tag instead of building.
