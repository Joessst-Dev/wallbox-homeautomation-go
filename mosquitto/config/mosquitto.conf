listener 1883
persistence true
persistence_location /mosquitto/data/

# SECURITY: evcc does NOT authenticate MQTT set-topics — anyone who can publish
# to this broker can control your charging. The settings below are an easy local
# default for a Pi behind your home firewall. For anything exposed, lock it down:
#
#   1. allow_anonymous false
#   2. password_file /mosquitto/config/passwd
#      (create with:  docker compose exec mosquitto mosquitto_passwd -c /mosquitto/config/passwd wha)
#   3. acl_file /mosquitto/config/acl   # restrict wha to evcc/loadpoints/<id>/.../set
#
# Then set mqtt.username/password in both evcc.yaml and wha config.
allow_anonymous true
