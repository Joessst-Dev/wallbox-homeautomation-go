name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repo.
permissions:
  contents: read

jobs:
  lint:
    name: Lint & vet
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod # single source of truth (1.25)
          cache: true # module + build cache, keyed on go.sum

      - name: gofmt (fail if unformatted)
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: updater sidecar self-test (semver guard + tag rewrite)
        run: sh scripts/updater/run.sh _selftest

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest # golangci-lint v2.x

  test:
    name: Test (race + coverage)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CGO_ENABLED: "1" # ONLY for the race detector; the release binary stays CGO_ENABLED=0
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: go test (race, shuffle, coverage)
        run: go test -race -shuffle=on -covermode=atomic -coverprofile=coverage.out ./...

      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -n 1

  build-sanity:
    name: Cross-compile (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    env:
      CGO_ENABLED: "0" # production build mode — guarantees the Pi target stays buildable
      GOOS: linux
      GOARCH: ${{ matrix.goarch }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build all packages
        run: go build ./...
