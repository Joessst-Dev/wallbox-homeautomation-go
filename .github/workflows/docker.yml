name: Docker (main)

on:
  push:
    branches: [main]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # push to GHCR via GITHUB_TOKEN

jobs:
  image:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # GHCR requires a lowercase path; owner is "Joessst-Dev" so hardcode lowercase.
          images: ghcr.io/joessst-dev/wha
          tags: |
            type=raw,value=edge
            type=sha,format=long

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        # NOTE: no setup-qemu-action — cross-compilation happens in the Dockerfile build stage.

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false # keep the GHCR package a clean single manifest list
          cache-from: type=gha
          cache-to: type=gha,mode=max
