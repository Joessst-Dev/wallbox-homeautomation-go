version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build(deps)" # conventional-commit prefix → clean GoReleaser changelog
    groups:
      go-dependencies:
        update-types:
          - minor
          - patch
    # Major bumps stay ungrouped (separate PRs) since they may break.

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: main
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci(deps)"
    groups:
      github-actions:
        patterns: ["*"]
